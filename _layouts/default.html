<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}Jordan Baillie</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{{ '/' | relative_url }}">Jordan Baillie</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">about</a>
        <a href="{{ '/projects/' | relative_url }}">projects</a>
        <a href="{{ '/hiking/' | relative_url }}">hiking</a>
        <a href="{{ '/blog/' | relative_url }}">blog</a>
      </div>
    </nav>
  </header>
  <main>{{ content }}</main>
  <footer class="site-footer">&copy; {{ 'now' | date: '%Y' }} Jordan Baillie</footer>
</body>
</html>
