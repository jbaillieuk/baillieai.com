<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}Jordan Baillie</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/bootstrap.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/mdb.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/academicons.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/scholar-icons.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/jekyll-pygments-themes-github.css' | relative_url }}" id="highlight_theme_light">
  <link rel="stylesheet" href="{{ '/assets/css/jekyll-pygments-themes-native.css' | relative_url }}" media="none" id="highlight_theme_dark">
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script>initTheme();</script>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body class="fixed-top-nav sticky-bottom-footer">
  <header>
    <nav id="navbar" class="navbar navbar-light fixed-top" role="navigation">
      <div class="container">
        <a class="navbar-brand title font-weight-lighter" href="{{ '/' | relative_url }}">
          <span class="font-weight-bold">Jordan</span> Baillie
        </a>
        <div class="navbar-nav ml-auto flex-row align-items-center">
          <a class="nav-item nav-link {% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">about</a>
          <a class="nav-item nav-link {% if page.url contains '/projects/' %}active{% endif %}" href="{{ '/projects/' | relative_url }}">projects</a>
          <a class="nav-item nav-link {% if page.url contains '/hiking/' %}active{% endif %}" href="{{ '/hiking/' | relative_url }}">hiking</a>
          <a class="nav-item nav-link {% if page.url contains '/blog/' %}active{% endif %}" href="{{ '/blog/' | relative_url }}">blog</a>
          <button id="light-toggle" title="Change theme" type="button">
            <i class="fa-half-sun-moon" id="light-toggle-system" aria-hidden="true"></i>
            <i class="fa-solid fa-moon" id="light-toggle-dark" aria-hidden="true"></i>
            <i class="fa-solid fa-sun" id="light-toggle-light" aria-hidden="true"></i>
            <span class="sr-only">Change theme</span>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <div class="container mt-5" role="main">{{ content }}</div>

  <footer class="sticky-bottom mt-5" role="contentinfo">
    <div class="container">
      &copy; {{ 'now' | date: '%Y' }} Jordan Baillie.
      <a href="mailto:jordan@baillieai.com">Email</a>.
      <a href="https://www.linkedin.com/in/jordanbaillie/">LinkedIn</a>.
    </div>
  </footer>

  <script src="{{ '/assets/js/bootstrap.bundle.min.js' | relative_url }}"></script>
</body>
</html>
